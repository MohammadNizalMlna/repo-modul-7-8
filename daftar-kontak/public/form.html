<!DOCTYPE html>
<html>
<head>
    <title>Tambah Kontak</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- navbar -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-person-plus"></i> Tambah Kontak
        </span>
    </div>
</nav>
<!-- card utama -->
<div class="container mt-4">
    <div class="card p-4">
        <h4 class="fw-bold mb-3">Form Tambah Kontak</h4>
        <form id="form">
            <!-- nama -->
            <div class="mb-3">
                <label class="form-label">Nama</label>
                <input class="form-control" name="nama" required>
            </div>
            <!-- no hp -->
            <div class="mb-3">
                <label class="form-label">No HP</label>
                <input 
                    class="form-control" 
                    name="nohp" 
                    required
                    placeholder="Contoh: 08123456789"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                >
            </div>
            <!-- email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" name="email" type="email" required>
            </div>
            <button class="btn btn-success w-100">
                <i class="bi bi-save"></i> Simpan
            </button>
        </form>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // tambah data 
$('#form').submit(function(e){
    e.preventDefault();
    let nama = $('input[name=nama]').val().trim();
    let nohp = $('input[name=nohp]').val().trim();
    let email = $('input[name=email]').val().trim();
    if (!/^[0-9]+$/.test(nohp)) {
        Swal.fire('Error!', 'No HP hanya boleh angka!', 'error');
        return;
    }
    if (!email.includes('@')) {
        Swal.fire('Error!', 'Email tidak valid!', 'error');
        return;
    }
    $.ajax({
        url: 'http://localhost:3000/kontak',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
            nama: nama,
            nohp: nohp,
            email: email
        }),
        success: () => {
            Swal.fire({
                icon: 'success',
                title: 'Berhasil!',
                text: 'Kontak berhasil ditambahkan'
            }).then(() => {
                window.location = 'index.html';
            });
        }
    });
});
</script>
</body>
</html>
