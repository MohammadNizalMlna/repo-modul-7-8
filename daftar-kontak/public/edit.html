<!DOCTYPE html>
<html>
<head>
    <title>Edit Kontak</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-pencil-square"></i> Edit Kontak
        </span>
    </div>
</nav>

<div class="container mt-4">
    <div class="card p-4">
        <h4 class="fw-bold mb-3">Form Edit Kontak</h4>
        <form id="form">
            <!-- Nama -->
            <div class="mb-3">
                <label class="form-label">Nama</label>
                <input id="nama" class="form-control" required>
            </div>

            <!-- No HP -->
            <div class="mb-3">
                <label class="form-label">No HP</label>
                <input 
                    id="nohp" 
                    class="form-control" 
                    required
                    placeholder="Contoh: 08123456789"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                >
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="email" class="form-control" type="email" required>
            </div>

            <!-- Button -->
            <button class="btn btn-warning w-100">
                <i class="bi bi-save"></i> Perbarui
            </button>

        </form>

    </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
const id = new URLSearchParams(window.location.search).get('id');

// ambil data
fetch(`http://localhost:3000/kontak/${id}`)
.then(res => res.json())
.then(data => {
    $('#nama').val(data.nama);
    $('#nohp').val(data.nohp);
    $('#email').val(data.email);
});

// update
$('#form').submit(function(e){
    e.preventDefault();

    let nama = $('#nama').val().trim();
    let nohp = $('#nohp').val().trim();
    let email = $('#email').val().trim();
    if (!/^[0-9]+$/.test(nohp)) {
        Swal.fire('Error!', 'No HP hanya boleh angka!', 'error');
        return;
    }
    if (!email.includes('@')) {
        Swal.fire('Error!', 'Email tidak valid!', 'error');
        return;
    }
    fetch(`http://localhost:3000/kontak/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            nama: nama,
            nohp: nohp,
            email: email
        })
    }).then(() => {
        Swal.fire({
            icon: 'success',
            title: 'Berhasil!',
            text: 'Data berhasil diubah'
        }).then(() => {
            window.location = 'index.html';
        });
    });
});
</script>

</body>
</html>
